<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="output.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-[#0d0d0d] text-white">
  <!--NAVBAR -->
  <nav class="max-w-7xl mx-auto flex items-center justify-between px-4 sm:px-6 py-4 sm:py-5">
    <div class="flex items-center gap-4 sm:gap-10">
      <h1 class="text-[#cc0000] text-2xl sm:text-3xl font-bold tracking-wider">
        CINEPHILE
      </h1>
      <div class="flex items-center gap-3 sm:gap-6">
        <a href="index.html" class="text-[#cc0000] text-xs sm:text-sm font-medium">
          Home
        </a>
        <a href="favourites.html" class="text-[#aaaaaa] text-xs sm:text-sm hover:text-[#cc0000] transition">
          Favourites
        </a>
      </div>
    </div>
    <div class="flex items-center gap-3 sm:gap-5">
      <button
        class="flex items-center justify-center w-9 h-9 sm:w-auto sm:h-auto text-[#aaaaaa]  transition">
        <i data-lucide="search" class="w-5 h-5"></i>
      </button>
      <button class="flex items-center justify-center
      w-9 h-9 sm:w-auto sm:h-auto
      text-[#aaaaaa]  transition">
        <i data-lucide="user" class="w-5 h-5"></i>
      </button>
    </div>
  </nav>


  <!-- LOADER -->
  <div id="loader"
class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
  <div
  class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin">
  </div>
</div>


  <main class="max-w-7xl mx-auto px-6  space-y-12">
    <!-- HERO -->
    <section id="movieHero" class="relative h-screen w-full text-[#ffffff] overflow-hidden">
    </section>

    <section class="px-16 -mt-20 relative z-20">

      <h2 class="text-2xl text-[#fffffF] font-bold mb-6">
        Top Cast
      </h2>

      <div id="castContainer" class="flex text-[#aaaaaa] items-center gap-8 flex-wrap">
      </div>

    </section>

    <footer class="max-w-7xl mx-auto px-6 py-8 mt-20 border-t border-gray-800">
      <div class="flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="text-center md:text-left">

          <h1 class="text-[#cc0000] text-3xl font-bold tracking-wider">
            CINEPHILE
          </h1>

          <p class="text-gray-500 text-sm mt-2">
            © 2026 Cinephile. All rights reserved.
          </p>

        </div>
        <div class="flex items-center gap-8">
          <a href="index.html" class="text-[#aaaaaa] hover:text-[#cc0000] transition text-sm font-medium">
            Home
          </a>
          <a href="favourites.html" class="text-[#aaaaaa] hover:text-[#cc0000] transition text-sm font-medium">
            Favourites
          </a>

        </div>
        <div class="flex items-center gap-5">
          <button class="text-[#aaaaaa]  transition">

            <i data-lucide="earth"></i>

          </button>
          <button class="text-[#aaaaaa] transition">
            <i data-lucide="at-sign"></i>
          </button>
        </div>
      </div>
    </footer>

    <script type="module" src="./javascript/details.js"></script>
    <script>
      lucide.createIcons();
    </script>
</body>

</html>
