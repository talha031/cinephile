<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="output.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-[#0d0d0d] text-white">
    <nav class="max-w-7xl mx-auto flex items-center justify-between px-4 sm:px-6 py-4 sm:py-5">
  <div class="flex items-center gap-4 sm:gap-10">
    <h1 class="text-[#cc0000] text-2xl sm:text-3xl font-bold tracking-wider">
      CINEPHILE
    </h1>
    <div class="flex items-center gap-3 sm:gap-6">
      <a href="index.html"
        class="text-[#aaaaaa] text-xs sm:text-sm hover:text-[#cc0000] transition">
        Home
      </a>
      <a href="favourites.html"
        class="text-[#cc0000] text-xs sm:text-sm">
        Favourites
      </a>
    </div>
  </div>
  <div class="flex items-center gap-3 sm:gap-5">
    <button class="flex items-center justify-center w-9 h-9 sm:w-auto sm:h-auto text-[#aaaaaa] transition">
      <i data-lucide="search" class="w-5 h-5"></i>
    </button>
    <button class="flex items-center justify-center w-9 h-9 sm:w-auto sm:h-auto text-[#aaaaaa] transition">
      <i data-lucide="user" class="w-5 h-5"></i>
    </button>
  </div>
</nav>


    <section class="max-w-7xl text-[#ffffff] mx-auto px-6 mt-10 flex items-center justify-between">
        <div>
            <h1 class="text-4xl font-bold">
                Your Favourites
            </h1>

            <p class="text-[#aaaaaa] mt-2">
                All your saved movies in one place
            </p>
        </div>

        <!-- COUNT BADGE -->
        <div class="bg-red-600 text-[#ffffff] px-4 py-2 rounded-full text-sm font-semibold">
            <span id="favCount">0</span> Saved
        </div>

    </section>

    <section class="max-w-7xl mx-auto px-6 mt-10">
        <h2 class="text-2xl font-semibold mb-5">Saved Movies</h2>
        <div id="favouritesContainer" class="flex gap-4 overflow-x-auto pb-4 items-start">
        </div>
    </section>


    <section id="emptyState" class="hidden text-center mt-20">

        <h2 class="text-2xl font-bold">
            No Favourites Yet
        </h2>

        <p class="mt-2">
            Save movies to see them here
        </p>

    </section>

     <footer class="max-w-7xl mx-auto px-6 py-8 mt-20 border-t border-gray-800">
      <div class="flex flex-col md:flex-row items-center justify-between gap-6">
        <div class="text-center md:text-left">

          <h1 class="text-[#cc0000] text-3xl font-bold tracking-wider">
            CINEPHILE
          </h1>

          <p class="text-gray-500 text-sm mt-2">
            © 2026 Cinephile. All rights reserved.
          </p>

        </div>
        <div class="flex items-center gap-8">
          <a href="index.html" class="text-[#aaaaaa] hover:text-[#cc0000] transition text-sm font-medium">
            Home
          </a>
          <a href="favourites.html" class="text-[#aaaaaa] hover:text-[#cc0000] transition text-sm font-medium">
            Favourites
          </a>

        </div>
        <div class="flex items-center gap-5">
          <button class="text-[#aaaaaa] transition">

            <i data-lucide="earth"></i>

          </button>
          <button class="text-[#aaaaaa] transition">
            <i data-lucide="at-sign"></i>
          </button>
        </div>
      </div>
    </footer>
    <script type="module" src="./javascript/favourites.js"></script>
    <script>
  lucide.createIcons();
</script>
</body>

</html>
